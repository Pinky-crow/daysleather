<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>DAY 's Leather | 管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');</style>
</head>
<body class="bg-stone-50 font-['Noto_Serif_TC'] p-6">
    <div class="max-w-6xl mx-auto">
        <section class="bg-white p-6 rounded-2xl shadow-sm border mb-8">
            <h2 class="font-bold mb-4 text-xl text-stone-700">📦 商品快速上架</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="p-name" placeholder="商品名稱" class="border p-2 rounded">
                <input type="number" id="p-price" placeholder="價格" class="border p-2 rounded">
                <input type="text" id="p-img" placeholder="圖片連結" class="border p-2 rounded md:col-span-2">
                <button onclick="uploadProduct()" class="md:col-span-2 bg-stone-800 text-white py-2 rounded font-bold">發佈商品</button>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-amber-500">
                <h3 class="font-bold mb-3">📋 最新訂單</h3>
                <div id="order-list" class="space-y-2 text-sm text-stone-500">等待資料...</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-500">
                <h3 class="font-bold mb-3">🛠️ 訂製詢問</h3>
                <div id="custom-list" class="space-y-2 text-sm text-stone-500">等待資料...</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-green-500">
                <h3 class="font-bold mb-3">💬 一般 QA</h3>
                <div id="qa-list" class="space-y-2 text-sm text-stone-500">等待資料...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWyGyH24wruA_dNiUiG6sF8OvsoBL96x0",
            authDomain: "adadd-65e14.firebaseapp.com",
            projectId: "adadd-65e14",
            storageBucket: "adadd-65e14.firebasestorage.app",
            messagingSenderId: "566570388047",
            appId: "1:566570388047:web:b5b1188527ad1828dff83a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 上架功能
        window.uploadProduct = async () => {
            const name = document.getElementById('p-name').value;
            const price = Number(document.getElementById('p-price').value);
            const img = document.getElementById('p-img').value;
            try {
                await addDoc(collection(db, "products"), { name, price, imgs: [img], createdAt: serverTimestamp() });
                alert('上架成功！');
            } catch (e) { alert('上架失敗'); }
        };

        // 監聽訂單
        // 監聽訂單
// admin.html 監聽訂單區塊
// admin.html 監聽訂單區塊 (第 65 行開始)
// admin.html 完整訂單監聽與顯示邏輯
onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snap) => {
    const orderList = document.getElementById('order-list');
    let html = "";

    snap.docs.forEach(doc => {
        const d = doc.data();
        let itemsHTML = "";
        
        // 1. 處理商品清單與數量計算
        if (d.items && Array.isArray(d.items)) {
            itemsHTML = d.items.map(item => {
                const price = Number(item.price) || 0;
                const qty = Number(item.qty) || 1; // 抓取數量，預設為 1
                const subtotal = price * qty;        // 計算單項小計
                
                return `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; border-bottom:1px solid #f0f0f0; padding-bottom:5px; font-size:14px;">
                    <div style="flex:2; color:#333;">• ${item.name || '未名商品'}</div>
                    <div style="flex:1; text-align:center; color:#666;">$${price} x ${qty}</div>
                    <div style="flex:1; text-align:right; font-weight:bold; color:#333;">$${subtotal}</div>
                </div>`;
            }).join("");
        } else {
            itemsHTML = `<div style="color:#999; text-align:center;">無商品明細</div>`;
        }

        // 2. 組合完整的訂單卡片 HTML
        html += `
            <div style="border:2px solid #eab308; padding:18px; margin-bottom:25px; background:#fffdf2; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.08);">
                <div style="margin-bottom:12px; line-height:1.8;">
                    <div style="font-size:1.2em; font-weight:bold; color:#1a1a1a;">👤 訂購人：${d.buyerName || '未填寫'}</div>
                    <div style="color:#2563eb; font-weight:bold;">📞 電話：${d.buyerPhone || '未填寫'}</div>
                    <div style="color:#4b5563; font-size:14px;">📍 地址：${d.buyerAddress || '未填寫'}</div>
                </div>
                
                <div style="background:#ffffff; border:1px solid #e5e7eb; border-radius:8px; padding:12px; margin:10px 0;">
                    <div style="display:flex; justify-content:space-between; font-size:12px; color:#9ca3af; margin-bottom:8px; font-weight:bold; border-bottom:1px solid #eee; padding-bottom:4px;">
                        <span style="flex:2;">商品項目</span>
                        <span style="flex:1; text-align:center;">單價 x 數量</span>
                        <span style="flex:1; text-align:right;">小計</span>
                    </div>
                    ${itemsHTML}
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; padding-top:10px; border-top:2px dashed #eee;">
                    <span style="font-size:12px; color:#999;">下單時間：${d.createdAt ? d.createdAt.toDate().toLocaleString() : '讀取中...'}</span>
                    <div style="text-align:right; font-weight:bold; color:#e63946; font-size:1.4em;">
                        💰 總計：NT$ ${d.total || 0}
                    </div>
                </div>
            </div>`;
    });

    // 3. 渲染到畫面上
    if (orderList) {
        orderList.innerHTML = html || '<div style="text-align:center; padding:50px; color:#ccc;">📭 目前尚無訂單資料</div>';
    }
});
// --- 監聽訊息 (分流) ---
    onSnapshot(query(collection(db, "messages"), orderBy("createdAt", "desc")), (snap) => {
        const customList = document.getElementById('custom-list');
        const qaList = document.getElementById('qa-list');
        
        let customHTML = "";
        let qaHTML = "";

        snap.docs.forEach(doc => {
            const d = doc.data();
            const card = `
                <div class="p-3 bg-stone-50 border rounded shadow-sm mb-2">
                    <div class="text-blue-600 font-bold text-xs">📩 ${d.email || '無信箱'}</div>
                    <div class="text-stone-800 text-sm mt-1">${d.content || '無內容'}</div>
                </div>`;
            
            if (d.type === "custom") {
                customHTML += card;
            } else {
                qaHTML += card;
            }
        });

        if (customList) customList.innerHTML = customHTML || '<p class="text-gray-400">目前無訂製需求</p>';
        if (qaList) qaList.innerHTML = qaHTML || '<p class="text-gray-400">目前無 QA 諮詢</p>';
    });
    </script>
</body>
</html>
