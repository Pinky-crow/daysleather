<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>DAY 's Leather | 職人管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f4f1ee; font-family: sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 border-b-2 border-stone-800 pb-2">管理後台</h1>

        <div class="flex gap-4 mb-8">
            <button onclick="showTab('tab-products')" class="px-6 py-2 bg-stone-800 text-white rounded">商品管理</button>
            <button onclick="showTab('tab-orders')" class="px-6 py-2 bg-stone-600 text-white rounded">查看訂單</button>
            <button onclick="showTab('tab-inbox')" class="px-6 py-2 bg-stone-600 text-white rounded">諮詢與留言</button>
        </div>

        <div id="tab-products" class="tab-content active">
            <div class="bg-white p-6 rounded shadow-sm mb-8">
                <h2 class="text-xl font-bold mb-4">新增商品</h2>
<div class="grid grid-cols-2 gap-4">
    <input type="text" id="p-name" placeholder="商品名稱" class="border p-2">
    <input type="number" id="p-price" placeholder="價格" class="border p-2">
    <div class="col-span-2">
        <label class="block text-sm mb-1">上傳商品圖片：</label>
        <input type="file" id="p-file" accept="image/*" class="w-full border p-2 bg-white">
    </div>
    <input type="text" id="p-desc" placeholder="商品簡介" class="border p-2 col-span-2">
</div>
<button onclick="addProduct()" id="upload-btn" class="mt-4 w-full py-2 bg-green-700 text-white font-bold rounded">上架商品 (含圖片上傳)</button>
            </div>
            <div id="admin-product-list" class="grid grid-cols-1 gap-4">
                </div>
        </div>

        <div id="tab-orders" class="tab-content">
            <h2 class="text-xl font-bold mb-4">所有訂單</h2>
            <div id="admin-order-list" class="space-y-4"></div>
        </div>

        <div id="tab-inbox" class="tab-content">
            <h2 class="text-xl font-bold mb-4">客戶留言與訂製需求</h2>
            <div id="admin-inbox-list" class="space-y-4"></div>
        </div>
    </div>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
// 🔥 這是上傳檔案必備的模組
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
    apiKey: "AIzaSyCH8JNUkItkGNFOw8ySPf7hW5cHRxcDFzQ",
    authDomain: "sadawe2-6f052.firebaseapp.com",
    projectId: "sadawe2-6f052",
    storageBucket: "sadawe2-6f052.firebasestorage.app",
    messagingSenderId: "910247266654",
    appId: "1:910247266654:web:389b581d7206d16c15a7cf",
    measurementId: "G-HZLEQ067LJ"
};

// 初始化 Firebase 服務
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// --- 核心功能 1：上傳圖片並新增商品 ---
window.addProduct = async () => {
    const name = document.getElementById('p-name').value;
    const price = Number(document.getElementById('p-price').value);
    const desc = document.getElementById('p-desc').value;
    const file = document.getElementById('p-file').files[0]; // 抓取檔案
    const btn = document.getElementById('upload-btn');

    // 基本檢查
    if (!name || !price || !file) {
        alert('請填寫商品名稱、價格並選擇一張圖片！');
        return;
    }

    try {
        btn.innerText = "正在上傳圖片中...";
        btn.disabled = true;

        // A. 將圖片檔案上傳到 Storage 倉庫
        // 路徑設定為：products/時間戳記_檔名 (避免重複)
        const storageRef = ref(storage, 'products/' + Date.now() + "_" + file.name);
        const snapshot = await uploadBytes(storageRef, file);
        
        // B. 從倉庫取得該圖片的「公開網址」
        const imgUrl = await getDownloadURL(snapshot.ref);

        // C. 將「文字資料」加上「圖片網址」存入 Firestore 資料庫
        await addDoc(collection(db, "products"), {
            name: name,
            price: price,
            img: imgUrl, // 這裡存的是上傳後的網址，不再需要手動貼連結
            desc: desc,
            timestamp: new Date()
        });

        alert('商品上架成功！');
        
        // 清空輸入框
        document.getElementById('p-name').value = '';
        document.getElementById('p-price').value = '';
        document.getElementById('p-desc').value = '';
        document.getElementById('p-file').value = '';

    } catch (e) {
        console.error("錯誤細節：", e);
        alert('上傳失敗！原因：' + e.message);
    } finally {
        btn.innerText = "上架商品";
        btn.disabled = false;
    }
};

// --- 核心功能 2：刪除商品 ---
window.deleteProduct = async (id) => {
    if (confirm('確定要下架這件商品嗎？')) {
        await deleteDoc(doc(db, "products", id));
    }
};

// --- 核心功能 3：即時監聽並更新列表 ---
// 商品列表
onSnapshot(collection(db, "products"), (snap) => {
    const list = document.getElementById('admin-product-list');
    list.innerHTML = snap.docs.map(d => {
        const p = d.data();
        return `
            <div class="bg-white p-4 flex justify-between items-center shadow-sm border-b">
                <div class="flex items-center gap-4">
                    <img src="${p.img}" class="w-16 h-16 object-cover rounded">
                    <div>
                        <p class="font-bold">${p.name}</p>
                        <p class="text-sm text-gray-500">NT$ ${p.price}</p>
                    </div>
                </div>
                <button onclick="deleteProduct('${d.id}')" class="text-red-500 hover:text-red-700 font-medium">下架</button>
            </div>`;
    }).join('');
});

// 監聽訂單
onSnapshot(collection(db, "orders"), (snap) => {
    const list = document.getElementById('admin-order-list');
    list.innerHTML = snap.docs.map(d => {
        const o = d.data();
        return `
            <div class="bg-white p-4 rounded shadow-sm border-l-4 border-amber-800">
                <p class="font-bold text-lg">客戶：${o.name || '未留名'}</p>
                <div class="my-2 border-y py-2 text-sm">
                    ${o.items ? o.items.map(i => `${i.name} x ${i.qty}`).join('<br>') : '無品項資訊'}
                </div>
                <p class="font-bold text-amber-800">總計：NT$ ${o.total}</p>
            </div>`;
    }).join('');
});

// 監聽留言
onSnapshot(collection(db, "inbox"), (snap) => {
    const list = document.getElementById('admin-inbox-list');
    list.innerHTML = snap.docs.map(d => {
        const m = d.data();
        return `
            <div class="bg-white p-4 rounded shadow-sm">
                <p class="text-xs font-bold text-stone-500 uppercase">[${m.type}]</p>
                <p class="my-2">${m.content}</p>
                <p class="text-xs text-gray-400">聯絡：${m.email || '無'}</p>
            </div>`;
    }).join('');
});

// 切換分頁功能
window.showTab = (id) => {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
};    </script>
</body>
</html>
