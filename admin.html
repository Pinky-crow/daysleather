<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>DAY 's Leather | 管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');</style>
</head>
<body class="bg-stone-50 font-['Noto_Serif_TC'] p-6">
    <div class="max-w-6xl mx-auto">
        <section class="bg-white p-6 rounded-2xl shadow-sm border mb-8">
            <h2 class="font-bold mb-4 text-xl text-stone-700">📦 商品快速上架</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="p-name" placeholder="商品名稱" class="border p-2 rounded">
                <input type="number" id="p-price" placeholder="價格" class="border p-2 rounded">
                <input type="text" id="p-img" placeholder="圖片連結" class="border p-2 rounded md:col-span-2">
                <button onclick="uploadProduct()" class="md:col-span-2 bg-stone-800 text-white py-2 rounded font-bold">發佈商品</button>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-amber-500">
                <h3 class="font-bold mb-3">📋 最新訂單</h3>
                <div id="order-list" class="space-y-2 text-sm text-stone-500">等待資料...</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-500">
                <h3 class="font-bold mb-3">🛠️ 訂製詢問</h3>
                <div id="custom-list" class="space-y-2 text-sm text-stone-500">等待資料...</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-green-500">
                <h3 class="font-bold mb-3">💬 一般 QA</h3>
                <div id="qa-list" class="space-y-2 text-sm text-stone-500">等待資料...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWyGyH24wruA_dNiUiG6sF8OvsoBL96x0",
            authDomain: "adadd-65e14.firebaseapp.com",
            projectId: "adadd-65e14",
            storageBucket: "adadd-65e14.firebasestorage.app",
            messagingSenderId: "566570388047",
            appId: "1:566570388047:web:b5b1188527ad1828dff83a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 上架功能
        window.uploadProduct = async () => {
            const name = document.getElementById('p-name').value;
            const price = Number(document.getElementById('p-price').value);
            const img = document.getElementById('p-img').value;
            try {
                await addDoc(collection(db, "products"), { name, price, imgs: [img], createdAt: serverTimestamp() });
                alert('上架成功！');
            } catch (e) { alert('上架失敗'); }
        };

        // 監聽訂單
        onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snap) => {
            document.getElementById('order-list').innerHTML = snap.docs.map(doc => `
                <div class="p-2 bg-stone-50 border-b">訂單 $${doc.data().total} <br> <span class="text-[10px]">${doc.data().email}</span></div>
            `).join('');
        });

        // 監聽訊息 (分流)

        onSnapshot(query(collection(db, "messages"), orderBy("createdAt", "desc")), (snap) => {
    // 找一個你後台有的 ID，例如 msg-list
    const el = document.getElementById('msg-list') || document.getElementById('custom-list');
    
    if (el) {
        el.innerHTML = snap.docs.map(doc => {
            const d = doc.data();
            return `
                <div class="p-3 bg-white border-b mb-2 shadow-sm">
                    <div class="text-blue-600 font-bold">📩 Gmail: ${d.email || '未提供'}</div>
                    <div class="text-stone-800 mt-1">${d.content || '空內容'}</div>
                    <div class="text-[9px] text-gray-400 mt-1">標籤: ${d.type || '無'}</div>
                </div>`;
        }).join('') || '資料庫裡目前沒有任何訊息';
    }
});
    </script>
</body>
</html>
