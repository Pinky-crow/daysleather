<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>DAY 's Leather | 管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b pb-6">
            <h1 class="text-3xl font-bold text-slate-800">📦 商品上架系統</h1>
            <a href="index.html" target="_blank" class="text-blue-600 hover:underline">查看官網 ↗</a>
        </header>

        <div class="grid gap-8">
            <section class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">商品名稱</label>
                        <input type="text" id="name" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">價格 (NT$)</label>
                        <input type="number" id="price" class="w-full border p-3 rounded-lg">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-2">圖片網址</label>
                        <input type="text" id="img" placeholder="https://..." class="w-full border p-3 rounded-lg">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-2">商品描述</label>
                        <textarea id="desc" rows="4" class="w-full border p-3 rounded-lg"></textarea>
                    </div>
                    <button onclick="upload()" class="md:col-span-2 bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                        正式發佈到官網
                    </button>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold mb-4">🔔 最近動態</h3>
                <div id="status" class="text-sm text-slate-500">正在連線至資料庫...</div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWyGyH24wruA_dNiUiG6sF8OvsoBL96x0",
            authDomain: "adadd-65e14.firebaseapp.com",
            projectId: "adadd-65e14",
            storageBucket: "adadd-65e14.firebasestorage.app",
            messagingSenderId: "566570388047",
            appId: "1:566570388047:web:b5b1188527ad1828dff83a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        document.getElementById('status').innerText = "✅ 已連線至 Firebase，隨時可以上架。";

        window.upload = async () => {
            const name = document.getElementById('name').value;
            const price = Number(document.getElementById('price').value);
            const img = document.getElementById('img').value;
            const desc = document.getElementById('desc').value;

            if(!name || !price || !img) return alert('請至少填寫名稱、價格跟圖片連結！');

            try {
                await addDoc(collection(db, "products"), {
                    name, price, imgs: [img], desc,
                    createdAt: serverTimestamp()
                });
                alert('✨ 上架成功！請去官網看看。');
                location.reload();
            } catch (e) {
                alert('錯誤：' + e.message);
            }
        };
    </script>
</body>
</html>
